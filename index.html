<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Christmas Party</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        /* 整個網頁的背景，並讓內容置中 */
        body { background-color: #0b132b; color: #edf2f4; height: 100vh; display: flex; justify-content: center; }
        
        /* 模擬手機 App 的外框 */
        .app-wrapper { width: 100%; max-width: 500px; position: relative; height: 100%; overflow: hidden; }

        /* 迎賓畫面 */
        #welcomeScreen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0b132b; z-index: 100; }
        
        /* 主功能區 */
        #appContainer { display: none; flex-direction: column; width: 100%; height: 100%; padding: 20px; overflow-y: auto; }
        
        /* 分頁內容 */
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }
        
        /* 頂部導航列 */
        .nav-btns { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .nav-btns button { flex: 1; padding: 12px; background: #1c2541; border: 1px solid #90e0ef; color: #90e0ef; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .welcome-btn { padding: 15px 30px; background: transparent; border: 1px solid #90e0ef; color: #90e0ef; border-radius: 30px; cursor: pointer; margin-top: 20px; }

        /* === 你的卡片與表單 UI 樣式 === */
        .card { background-color: #1c2541; border: 1px solid #3a506b; border-radius: 16px; padding: 20px; margin-bottom: 20px; width: 100%;}
        input, select { width: 100%; padding: 10px; margin: 5px 0; background: #0b132b; border: 1px solid #3a506b; color: white; border-radius: 8px; box-sizing: border-box;}
        .action-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid #90e0ef; color: #90e0ef; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .tag { display: inline-block; background: #3a506b; padding: 5px 10px; border-radius: 20px; margin: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <div id="welcomeScreen">
            <h1>2026 CHRISTMAS</h1>
            <p>PARTY CONTROLLER</p>
            <button class="welcome-btn" onclick="enterApp()">LAUNCH SYSTEM</button>
        </div>

        <div id="appContainer">
            <div class="nav-btns">
                <button onclick="switchTab('accounting')">💰 記帳</button>
                <button onclick="switchTab('games')">🎮 遊戲</button>
            </div>

            <div id="accountingTab" class="tab-content active">
                <h2 style="margin-bottom: 20px;">派對記帳區</h2>
                
                <div class="card">
                    <h3>👥 派對成員名單</h3>
                    <input type="text" id="memberInput" placeholder="輸入名字...">
                    <button class="action-btn" onclick="addMember()">新增成員</button>
                    <div id="memberTagsContainer"></div>
                </div>

                <div class="card">
                    <h3>💵 選擇付款人</h3>
                    <select id="payerSelect"></select>
                </div>

            </div>

            <div id="gamesTab" class="tab-content">
                <h2 style="margin-bottom: 20px;">交換禮物區</h2>
                <p>之後抽獎功能會放這裡...</p>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        // === 1. 畫面切換邏輯 ===
        function enterApp() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        // === 2. Firebase 初始化 ===
        const firebaseConfig = {
            apiKey: "AIzaSyAHCELtsXy0EOM_PtCIhj1bviLCOAFK8dc",
            authDomain: "christmas-party-d1644.firebaseapp.com",
            databaseURL: "https://christmas-party-d1644-default-rtdb.firebaseio.com",
            projectId: "christmas-party-d1644",
            storageBucket: "christmas-party-d1644.firebasestorage.app",
            messagingSenderId: "109660417434",
            appId: "1:109660417434:web:1e3ad17e8b77a9b8069e23"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let members = [];

        // === 3. 更新介面函式 ===
        function updateMemberUI() {
            const container = document.getElementById('memberTagsContainer');
            const select = document.getElementById('payerSelect');
            container.innerHTML = '';
            select.innerHTML = '<option value="">選擇付款人</option>';
            
            members.forEach(name => {
                container.innerHTML += `<div class="tag">${name}</div>`;
                select.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }

        // === 4. 新增成員函式 ===
        window.addMember = function() {
            const input = document.getElementById('memberInput');
            if (input.value) {
                let newMembers = [...members]; 
                newMembers.push(input.value);
                
                db.ref('party_data/members').set(newMembers)
                    .then(() => { input.value = ''; })
                    .catch(error => { console.error("寫入失敗:", error); });
            }
        };

        // === 5. 監聽雲端資料變化 ===
        db.ref('party_data/members').on('value', (snapshot) => {
            const data = snapshot.val();
            members = data || [];
            updateMemberUI();
        });
    </script>
</body>
</html>
