<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Christmas Party</title>
    <style>
        :root {
            --bg-color: #0b132b; --card-bg: #1c2541; --primary-light: #90e0ef;
            --accent-blue: #00b4d8; --text-main: #edf2f4; --text-muted: #a2d2ff; --border-color: #3a506b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 500px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: rgba(28, 37, 65, 0.5); border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 8px; cursor: pointer; }
        .tab-btn.active { border-color: var(--primary-light); color: var(--primary-light); background: rgba(144, 224, 239, 0.1); }
        .tab-content { display: none; flex-direction: column; gap: 20px; }
        .tab-content.active { display: flex; }
        .btn-block { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--primary-light); color: var(--primary-light); border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .btn-danger { color: #ef233c; border-color: #ef233c; padding: 4px 8px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .cloud-status { text-align: center; font-size: 11px; color: #4caf50; margin-bottom: 10px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="app-container">
    <header style="text-align:center; padding:20px;"><h1>2026 CHRISTMAS</h1></header>
    <div class="cloud-status">⚡ 雲端即時連線中</div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(this, 'accounting')">💰 派對記帳</button>
        <button class="tab-btn" onclick="switchTab(this, 'games')">🎮 聖誕遊戲</button>
    </div>

    <div id="accounting" class="tab-content active">
        <div class="card">
            <div style="color:var(--primary-light); margin-bottom:10px;">💵 新增消費</div>
            <input type="text" id="expenseDesc" placeholder="項目" style="width:100%; padding:10px; margin-bottom:5px; background:rgba(0,0,0,0.2); border:1px solid var(--border-color); color:white;">
            <div style="display:flex; gap:5px;">
                <input type="number" id="expenseAmount" placeholder="金額" style="flex:1; padding:10px; background:rgba(0,0,0,0.2); border:1px solid var(--border-color); color:white;">
                <select id="payerSelect" style="flex:1; background:rgba(0,0,0,0.2); border:1px solid var(--border-color); color:white;"></select>
            </div>
            <button class="btn-block" onclick="addExpense()">儲存消費</button>
        </div>
        <div class="card">
            <div style="color:var(--primary-light); margin-bottom:10px;">📝 消費明細</div>
            <div id="expenseListContainer"></div>
        </div>
    </div>

    <div id="games" class="tab-content">
        <div class="card">
            <div style="color:var(--primary-light); margin-bottom:10px;">🎁 交換禮物
                <button class="btn-danger" onclick="clearGiftResult()" style="float:right;">清除</button>
            </div>
            <button class="btn-block" onclick="matchGifts()">開始配對</button>
            <div id="giftResultBox" style="margin-top:15px; display:none; color:var(--text-main);"></div>
        </div>
    </div>
</div>

<script>
    // ⚙️ 請務必將下方的設定換成你 Firebase 的實際數據
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let members = [], expenses = [];

    // 初始化監聽
    db.ref('party_data').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        members = data.members || [];
        expenses = data.expenses || [];
        updateUI();
        const giftBox = document.getElementById('giftResultBox');
        if(data.gift_html) {
            giftBox.style.display = 'block';
            giftBox.innerHTML = data.gift_html;
        } else {
            giftBox.style.display = 'none';
        }
    });

    // 切換分頁邏輯
    function switchTab(btn, tabId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }

    function sync() { db.ref('party_data').set({ members, expenses }); }

    function addExpense() {
        const desc = document.getElementById('expenseDesc').value;
        const amount = document.getElementById('expenseAmount').value;
        const paidBy = document.getElementById('payerSelect').value;
        if(desc && amount) { 
            expenses.push({desc, amount, paidBy}); 
            sync(); 
        }
    }

    function deleteExpense(index) { expenses.splice(index, 1); sync(); }

    function updateUI() {
        document.getElementById('payerSelect').innerHTML = members.map(m => `<option>${m}</option>`).join('');
        document.getElementById('expenseListContainer').innerHTML = expenses.map((e, i) => `
            <div class="list-item">
                <div>${e.desc} (${e.paidBy})</div>
                <div>$${e.amount} <button class="btn-danger" onclick="deleteExpense(${i})">x</button></div>
            </div>
        `).join('');
    }

    function matchGifts() {
        let r = [...members].sort(() => Math.random() - 0.5);
        let h = members.map((m, i) => `• ${m} ➔ ${r[i]}`).join('<br>');
        db.ref('party_data/gift_html').set(h);
    }

    function clearGiftResult() {
        if(prompt("請輸入密碼 (9527)：") === "9527") db.ref('party_data/gift_html').remove();
    }
</script>
</body>
</html>
