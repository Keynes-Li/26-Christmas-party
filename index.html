<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Christmas Party</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang TC', 'Heiti TC', sans-serif; }
        
        :root {
            --bg-deep: #050914;
            --card-bg: #111a33;
            --neon-cyan: #0ff;
            --neon-green: #0f0;
            --neon-red: #ff003c;
            --neon-orange: #ff9f1c; /* 橘色霓虹 */
            --text-main: #edf2f4;
        }

        body { background-color: var(--bg-deep); color: var(--text-main); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        .app-wrapper { width: 100%; max-width: 500px; position: relative; height: 100%; overflow: hidden; border: 1px solid #1a2a4a; box-shadow: 0 0 20px rgba(0,255,255,0.1); }

        /* 迎賓畫面 */
        #welcomeScreen { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(circle at center, #1a2a4a 0%, #050914 70%);
            z-index: 100; overflow: hidden;
        }

        #snowCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.4; pointer-events: none; z-index: 1;
        }

        .welcome-content {
            z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center;
            padding: 0 20px;
        }

        .party-icons { font-size: 40px; margin-bottom: 10px; display: flex; gap: 15px; }
        .icon-beer { color: #ffbf00; text-shadow: 0 0 10px #ffbf00, 0 0 20px #ffbf00; animation: iconPulse 1.5s infinite alternate; }
        .icon-tree { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green); animation: iconPulse 1.5s infinite alternate 0.5s; }
        .icon-wine { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red); animation: iconPulse 1.5s infinite alternate 1s; }

        @keyframes iconPulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }

        #welcomeScreen h1 { 
            font-size: 38px; font-weight: 900; letter-spacing: 2px;
            color: #fff; text-transform: uppercase;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-cyan), 0 0 30px var(--neon-cyan), 0 0 40px var(--neon-cyan);
            animation: neonFlicker 2s infinite, titleGlitch 5s infinite;
            position: relative; margin-bottom: 5px;
        }

        /* 將 2026 改為橘色 */
        #welcomeScreen p { font-size: 24px; color: var(--neon-orange); font-weight: bold; font-family: monospace; letter-spacing: 5px; text-shadow: 0 0 10px var(--neon-orange); margin-bottom: 40px; }

        .welcome-btn { 
            position: relative;
            padding: 18px 40px; background: transparent; 
            border: 2px solid var(--neon-cyan); color: var(--neon-cyan); 
            border-radius: 40px; cursor: pointer; font-size: 18px; font-weight: bold; letter-spacing: 3px;
            text-transform: uppercase; overflow: hidden; transition: all 0.3s;
            text-shadow: 0 0 5px var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
        }

        .welcome-btn:active { transform: scale(0.95); background: rgba(0,255,255,0.1); }

        .welcome-btn::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 40px; box-shadow: 0 0 15px var(--neon-cyan);
            animation: btnPulse 2s infinite; opacity: 0;
        }

        @keyframes btnPulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.4); opacity: 0; } }

        @keyframes neonFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-cyan), 0 0 30px var(--neon-cyan); opacity: 1; }
            20%, 22%, 24%, 55% { text-shadow: none; opacity: 0.5; }
        }

        @keyframes titleGlitch {
            0%, 88%, 95%, 100% { transform: none; opacity: 1; }
            90% { transform: skewX(-15deg); opacity: 0.8; color: var(--neon-green); }
            92% { transform: skewX(15deg); opacity: 0.8; color: var(--neon-red); }
        }

        /* 其他分頁 UI 樣式 */
        #appContainer { display: none; flex-direction: column; width: 100%; height: 100%; padding: 20px; overflow-y: auto; }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }
        .nav-btns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 20px; width: 100%; }
        .nav-btns button { padding: 10px 0; background: #1c2541; border: 1px solid #3a506b; color: var(--text-main); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .nav-btns button.active { background: var(--neon-cyan); color: #0b132b; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,255,255,0.5); }
        .card { background-color: var(--card-bg); border: 1px solid #3a506b; border-radius: 16px; padding: 20px; margin-bottom: 20px; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card h3 { margin-bottom: 12px; font-size: 18px; display: flex; align-items: center; gap: 8px; color: var(--neon-cyan); }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; margin: 6px 0; background: var(--bg-deep); border: 1px solid #3a506b; color: white; border-radius: 8px; font-size: 15px; }
        .action-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; font-size: 15px; text-transform: uppercase; transition: 0.3s; }
        .action-btn:active { background: rgba(0,255,255,0.1); }
        .action-btn.secondary { border: 1px solid var(--neon-red); color: var(--neon-red); }
        .action-btn.secondary:active { background: rgba(255,0,60,0.1); }
        .tag-container { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { display: inline-flex; align-items: center; background: #3a506b; padding: 6px 12px; border-radius: 20px; font-size: 14px; color: white; }
        .tag-delete { margin-left: 8px; cursor: pointer; color: #ff9f1c; font-weight: bold; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; background: var(--bg-deep); padding: 10px; border-radius: 6px; font-size: 14px; cursor: pointer; border: 1px solid transparent; }
        .checkbox-label:has(input:checked) { border-color: var(--neon-green); background: rgba(0,255,0,0.05); }
        .list-item { background: var(--bg-deep); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--neon-cyan); }
        .list-item-info { font-size: 14px; line-height: 1.4; }
        .delete-btn { background: var(--neon-red); color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .settle-item { padding: 10px 0; border-bottom: 1px dashed #3a506b; font-size: 15px; color: #ccc; }
        .settle-item b { color: white; }
        .rank-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg-deep); border: 1px solid #3a506b; border-radius: 6px; margin-bottom: 8px; }
        .rank-num { font-weight: bold; color: var(--neon-cyan); margin-right: 10px; font-family: monospace; font-size: 18px; }
        .game-status { text-align: center; font-size: 24px; font-weight: bold; margin: 20px 0; min-height: 30px; font-family: monospace; }
        .gift-group-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #3a506b; }
        .gift-group-item select { width: auto; padding: 6px; margin: 0; font-size: 14px; background: #1a2a4a; }
        .result-box { background: var(--bg-deep); padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid var(--neon-cyan); }
        .result-row { margin-bottom: 8px; font-size: 15px; color: #ccc; }
        .result-row b { color: white; }
    </style>
</head>
<body>

        <div id="welcomeScreen">
            <canvas id="snowCanvas"></canvas>
            
            <div class="welcome-content">
                <div class="party-icons">
                    <span class="icon-beer">🍻</span>

                </div>

                    <h3 style="color: var(--neon-orange);">🚀 組別集體加分</h3>
    <div style="display: flex; gap: 10px; align-items: center;">
        <select id="groupSelect" style="flex: 1; background: #111a33; color: white; border: 1px solid var(--neon-orange); padding: 8px; border-radius: 5px;">
            <option value="">請先到遊戲區進行分組...</option>
        </select>
        <input type="number" id="groupScoreInput" placeholder="分數" style="width: 80px; background: #111a33; color: white; border: 1px solid var(--neon-orange); padding: 8px; border-radius: 5px;">
        <button onclick="addGroupScore()" style="padding: 8px 15px; background: var(--neon-orange); color: #050914; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; white-space: nowrap;">全組加分</button>
    </div>
</div>
                <div class="card">
                    <h3>🎛️ 分數調整</h3>
                    <select id="scorePlayerSelect"></select>
                    <input type="number" id="scoreChange" placeholder="分數 (如 10 或 -10)">
                    <button class="action-btn" onclick="updateScore()">更新分數</button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        // === 1. 雪花動畫防錯保護版 ===
        const canvas = document.getElementById('snowCanvas');
        let flakes = []; // 提早宣告確保作用域正確
        
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let width, height;

            function setCanvasSize() {
                const wrapper = document.querySelector('.app-wrapper');
                width = canvas.width = wrapper.offsetWidth;
                height = canvas.height = wrapper.offsetHeight;
            }

            class Flake {
                constructor() { this.init(); }
                init() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * -height; 
                    this.vy = Math.random() * 2 + 1;  
                    this.size = Math.random() * 3 + 1; 
                    const colors = ['#0f0', '#ff003c', '#0ff'];
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.opacity = Math.random() * 0.5 + 0.5;
                }
                update() {
                    this.y += this.vy;
                    if (this.y > height) { this.init(); this.y = -10; } 
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.random() * Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.opacity;
                    ctx.fill();
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x - this.size/2, this.y - 10, this.size, 10);
                    ctx.globalAlpha = 1;
                }
            }

            function initSnow() {
                flakes = []; 
                const count = width < 400 ? 40 : 80;
                for (let i = 0; i < count; i++) { flakes.push(new Flake()); }
            }

            function animateSnow() {
                ctx.clearRect(0, 0, width, height);
                flakes.forEach(f => { f.update(); f.draw(); });
                requestAnimationFrame(animateSnow);
            }

            window.addEventListener('resize', setCanvasSize);
            setCanvasSize();
            initSnow();
            animateSnow();
        }

        // === 2. 基礎畫面切換 ===
        function enterApp() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            flakes = []; // 進入 APP 後停止粒子計算
            switchTab('info');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btns button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');
            document.getElementById('nav-' + tabName).classList.add('active');
        }

        // === 3. Firebase 設定 ===
        const firebaseConfig = {
            apiKey: "AIzaSyAHCELtsXy0EOM_PtCIhj1bviLCOAFK8dc",
            authDomain: "christmas-party-d1644.firebaseapp.com",
            databaseURL: "https://christmas-party-d1644-default-rtdb.firebaseio.com",
            projectId: "christmas-party-d1644",
            storageBucket: "christmas-party-d1644.firebasestorage.app",
            messagingSenderId: "109660417434",
            appId: "1:109660417434:web:1e3ad17e8b77a9b8069e23"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let members = [];
        let expenses = {};
        let giftTiers = {}; 
        let giftResults = { good: null, bad: null }; 
        let scores = {};

        // === 4. 成員與記帳邏輯 ===
        function addMember() {
            const input = document.getElementById('memberInput');
            const name = input.value.trim();
            if (name) {
                if (members.includes(name)) { alert("名字重複囉！"); return; }
                let updated = [...members, name];
                db.ref('party_data/members').set(updated).then(() => { input.value = ''; });
            }
        }

        function removeMember(name) {
            if (confirm(`確定要移除成員「${name}」嗎？`)) {
                let updated = members.filter(m => m !== name);
                db.ref('party_data/members').set(updated);
            }
        }

        function updateMemberUI() {
            const tagsContainer = document.getElementById('memberTagsContainer');
            tagsContainer.innerHTML = members.length ? '' : '<span style="color:#5c677d; font-size:14px; margin-top:8px;">暫無成員，請從上方新增</span>';
            members.forEach(m => {
                tagsContainer.innerHTML += `<span class="tag">${m} <span class="tag-delete" onclick="removeMember('${m}')">✖</span></span>`;
            });

            const payerSelect = document.getElementById('payerSelect');
            payerSelect.innerHTML = '<option value="">-- 請選擇付款人 --</option>';
            members.forEach(m => { payerSelect.innerHTML += `<option value="${m}">${m}</option>`; });

            const splitContainer = document.getElementById('splitWithContainer');
            splitContainer.innerHTML = '';
            members.forEach(m => {
                splitContainer.innerHTML += `<label class="checkbox-label"><input type="checkbox" name="splitMember" value="${m}" checked> ${m}</label>`;
            });

            const gamePlayerSelect = document.getElementById('gamePlayerSelect');
            if(gamePlayerSelect) {
                let currentVal = gamePlayerSelect.value;
                gamePlayerSelect.innerHTML = '<option value="">-- 送出前，請先選擇你是誰 --</option>';
                members.forEach(m => { gamePlayerSelect.innerHTML += `<option value="${m}">${m}</option>`; });
                if(members.includes(currentVal)) gamePlayerSelect.value = currentVal; 
            }

            renderGiftGroupUI();
            updateScoreUI();
        }

        function addExpense() {
            const purpose = document.getElementById('expensePurpose').value.trim();
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            const payer = document.getElementById('payerSelect').value;
            const splitWith = Array.from(document.querySelectorAll('input[name="splitMember"]:checked')).map(cb => cb.value);

            if (!purpose || isNaN(amount) || amount <= 0 || !payer || splitWith.length === 0) {
                alert("請填寫完整的消費項目、金額、付款人，並至少勾選一位分攤人！"); return;
            }

            db.ref('party_data/expenses').push({ purpose, amount, payer, splitWith, timestamp: Date.now() }).then(() => {
                document.getElementById('expensePurpose').value = '';
                document.getElementById('expenseAmount').value = '';
                alert("消費記錄已同步上傳！");
            });
        }

        function deleteExpense(key) {
            if (confirm("確定要刪除這筆消費紀錄嗎？")) db.ref(`party_data/expenses/${key}`).remove();
        }

        function updateExpenseAndSettlementUI() {
            const listContainer = document.getElementById('expenseListContainer');
            listContainer.innerHTML = '';
            let hasData = false;
            for (let key in expenses) {
                hasData = true;
                let exp = expenses[key];
                listContainer.innerHTML += `
                    <div class="list-item">
                        <div class="list-item-info">
                            <b>${exp.purpose}</b><br><span style="color:#0ff">$${exp.amount}</span> 元 ── 由 <b>${exp.payer}</b> 支付<br>
                            <span style="color:#5c677d; font-size:12px;">分攤：${exp.splitWith.join(', ')}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteExpense('${key}')">❌ 刪除</button>
                    </div>`;
            }
            if (!hasData) listContainer.innerHTML = '<div style="color:#5c677d; font-size:14px; text-align:center; padding:10px;">目前尚無消費明細</div>';
            runSettlementAlgorithm();
        }

        function runSettlementAlgorithm() {
            const container = document.getElementById('settlementContainer');
            container.innerHTML = '';
            if (members.length === 0) { container.innerHTML = '<span style="color:#5c677d; font-size:14px;">請先建立成員名單</span>'; return; }

            let balances = {};
            members.forEach(m => balances[m] = 0);

            for (let key in expenses) {
                let exp = expenses[key];
                let amt = parseFloat(exp.amount) || 0;
                if (balances[exp.payer] !== undefined) balances[exp.payer] += amt;
                let share = amt / (exp.splitWith || []).length;
                (exp.splitWith || []).forEach(p => { if (balances[p] !== undefined) balances[p] -= share; });
            }

            let debtors = [], creditors = [];
            for (let m in balances) {
                if (balances[m] < -0.01) debtors.push({ name: m, amount: -balances[m] });
                else if (balances[m] > 0.01) creditors.push({ name: m, amount: balances[m] });
            }
            debtors.sort((a, b) => b.amount - a.amount);
            creditors.sort((a, b) => b.amount - a.amount);

            let instructions = [];
            let i = 0, j = 0;
            while (i < debtors.length && j < creditors.length) {
                let d = debtors[i], c = creditors[j];
                let transfer = Math.min(d.amount, c.amount);
                if (transfer > 0.1) instructions.push(`🔹 <b>${d.name}</b> 應轉給 <b>${c.name}</b> <span style="color:#0f0; font-weight:bold;">$${Math.round(transfer)}</span> 元`);
                d.amount -= transfer; c.amount -= transfer;
                if (d.amount <= 0.1) i++;
                if (c.amount <= 0.1) j++;
            }

            if (instructions.length === 0) container.innerHTML = '<div style="color:#0f0; font-size:14px; text-align:center;">帳目完全平衡！👍</div>';
            else instructions.forEach(ins => { container.innerHTML += `<div class="settle-item">${ins}</div>`; });
        }

        // === 5. 遊戲邏輯 ===
        function initGameSync() {
            db.ref('party_data/game').on('value', (snapshot) => {
                const game = snapshot.val();
                const msgDiv = document.getElementById('gameMsg');
                const controls = document.getElementById('gameControls');
                const resetBtn = document.getElementById('resetGameBtn');
                if (!game) { resetGame(); return; }

                if (game.gameOver) {
                    msgDiv.innerHTML = game.msg;
                    controls.style.display = 'none'; resetBtn.style.display = 'block';
                } else {
                    msgDiv.innerHTML = `${game.min} ~ ${game.max}`;
                    controls.style.display = 'block'; resetBtn.style.display = 'none';
                }
            });
        }
        function resetGame() {
            db.ref('party_data/game').set({ answer: Math.floor(Math.random() * 100) + 1, min: 1, max: 100, gameOver: false, msg: "1 ~ 100" });
            document.getElementById('guessInput').value = '';
        }
        function submitGuess() {
            const playerName = document.getElementById('gamePlayerSelect')?.value;
            if (!playerName) { alert("請先選擇你是誰！"); return; }
            const guess = parseInt(document.getElementById('guessInput').value);
            if (isNaN(guess) || !guess) { alert("請輸入有效的數字！"); return; }

            db.ref('party_data/game').once('value', (snapshot) => {
                let game = snapshot.val();
                if (!game || game.gameOver) return;
                if (guess <= game.min || guess >= game.max) { alert(`請猜有效範圍 (${game.min} ~ ${game.max})！`); return; }

                if (guess === game.answer) {
                    game.gameOver = true;
                    // 👇 用這行徹底綁定每一行的顏色（第一二行橘色、第三行紅色） 👇
                    game.msg = `<span style="color: #ff9f1c !important;">💥 爆炸了 💥</span><br><span style="color: #ff9f1c !important;">【 ${playerName} 】喝一杯！</span><br><span style="color: #ff003c !important;">密碼是 ${game.answer}</span>`;
                    // 👆 加入了 !important 確保絕對不會被外層的 CSS 樣式蓋過去 👆
                } else if (guess < game.answer) game.min = Math.max(game.min, guess);
                else game.max = Math.min(game.max, guess);
                db.ref('party_data/game').set(game).then(() => { document.getElementById('guessInput').value = ''; });
            });
        }

        // === 6. 抽禮物邏輯 ===
        function renderGiftGroupUI() {
            const container = document.getElementById('giftGroupContainer');
            if (members.length === 0) {
                container.innerHTML = '<div style="color:#5c677d; font-size:14px; text-align:center;">請先至記帳頁面新增成員</div>';
                return;
            }
            container.innerHTML = '';
            members.forEach(m => {
                let currentTier = giftTiers[m] || "";
                container.innerHTML += `
                    <div class="gift-group-item">
                        <span>👤 ${m}</span>
                        <select onchange="updateGiftTier('${m}', this.value)">
                            <option value="" ${currentTier==="" ? "selected":""}>未分組</option>
                            <option value="1500" ${currentTier==="1500" ? "selected":""}>1500元組</option>
                            <option value="1000" ${currentTier==="1000" ? "selected":""}>1000元組</option>
                            <option value="500" ${currentTier==="500" ? "selected":""}>500元組</option>
                        </select>
                    </div>
                `;
            });
        }

        function updateGiftTier(member, tier) { db.ref(`party_data/gift_tiers/${member}`).set(tier); }

        function shuffleDerangement(arr) {
            if (arr.length <= 1) return null; 
            let copy = [...arr];
            let isDerangement = false;
            while (!isDerangement) {
                for (let i = copy.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [copy[i], copy[j]] = [copy[j], copy[i]];
                }
                isDerangement = true;
                for (let i = 0; i < arr.length; i++) {
                    if (arr[i] === copy[i]) { isDerangement = false; break; }
                }
            }
            return copy;
        }

        function drawGoodGifts() {
            let groups = { "1500": [], "1000": [], "500": [] };
            members.forEach(m => {
                let tier = giftTiers[m];
                if (tier && groups[tier]) groups[tier].push(m);
            });

            let newResults = {};
            let hasError = false;

            for (let t in groups) {
                let groupMembers = groups[t];
                if (groupMembers.length > 0) {
                    let letters = [];
                    for (let i = 0; i < groupMembers.length; i++) { letters.push(String.fromCharCode(65 + i)); }
                    for (let i = letters.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [letters[i], letters[j]] = [letters[j], letters[i]];
                    }
                    newResults[t] = groupMembers.map((m, i) => ({ drawer: m, gotGiftCode: letters[i] }));
                }
            }

            if (!hasError && Object.keys(newResults).length > 0) {
                db.ref('party_data/gift_results/good').set(newResults);
            } else if (!hasError) {
                alert("目前沒有任何人被分配到組別內喔！");
            }
        }

        function drawBadGifts() {
            if (members.length <= 1) { alert("人數不足，無法進行壞禮物抽籤！"); return; }
            let shuffled = shuffleDerangement(members);
            let newResults = members.map((m, i) => ({ drawer: m, gotGiftFrom: shuffled[i] }));
            db.ref('party_data/gift_results/bad').set(newResults);
        }

        function resetGiftResults() {
            let pwd = prompt("主辦人專用：請輸入管理員密碼以重置抽籤結果");
            if (pwd === "9527") {
                db.ref('party_data/gift_results').remove();
                alert("✅ 抽籤結果已全部清除，可以重新抽籤囉！");
            } else if (pwd !== null) {
                alert("❌ 密碼錯誤，拒絕重置！");
            }
        }

        function renderGiftResultsUI() {
            const goodBox = document.getElementById('goodGiftResultsContainer');
            const badBox = document.getElementById('badGiftResultsContainer');
            const drawGoodBtn = document.getElementById('drawGoodBtn');
            const drawBadBtn = document.getElementById('drawBadBtn');

            if (giftResults && giftResults.good) {
                drawGoodBtn.style.display = 'none';
                goodBox.style.display = 'block';
                goodBox.innerHTML = '';
                ['1500', '1000', '500'].forEach(t => {
                    if (giftResults.good[t]) {
                        goodBox.innerHTML += `<div style="color:#ff9f1c; font-weight:bold; margin: 10px 0 5px 0;">✨ ${t}元組：</div>`;
                        giftResults.good[t].forEach(res => {
                            let display = res.gotGiftCode ? `禮物 ${res.gotGiftCode}` : res.gotGiftFrom;
                            goodBox.innerHTML += `<div class="result-row"><b>${res.drawer}</b> 抽到 👉 <b style="color:#0f0;">${display}</b></div>`;
                        });
                    }
                });
            } else {
                drawGoodBtn.style.display = 'block';
                goodBox.style.display = 'none';
            }

            if (giftResults && giftResults.bad) {
                drawBadBtn.style.display = 'none';
                badBox.style.display = 'block';
                badBox.innerHTML = `<div style="color:#ff9f1c; font-weight:bold; margin-bottom: 5px;">💩 壞禮物大亂鬥：</div>`;
                giftResults.bad.forEach(res => {
                    badBox.innerHTML += `<div class="result-row"><b>${res.drawer}</b> 抽到 👉 <b>${res.gotGiftFrom}</b> 的壞禮物</div>`;
                });
            } else {
                drawBadBtn.style.display = 'block';
                badBox.style.display = 'none';
            }
        }

        // === 7. 計分板模組 ===
        // 全域變數，用來儲存目前的組別狀態
        let currentGroups = []; 
        // 1. 隨機分組核心邏輯
        function generateGroups() {
            // 假設你的成員陣列叫做 members
            if (!members || members.length === 0) {
                alert("請先在「資訊」分頁新增派對成員！");
                return;
            }
            
            const numGroups = parseInt(document.getElementById('groupCount').value);
            
            // 複製一份成員名單並打亂順序 (洗牌演算法)
            let shuffled = [...members].sort(() => 0.5 - Math.random());
            
            // 建立指定數量的空陣列作為組別
            currentGroups = Array.from({ length: numGroups }, () => []);
            
            // 依序像發牌一樣把成員派發到各組
            shuffled.forEach((member, index) => {
                currentGroups[index % numGroups].push(member);
            });
            
            renderGroups();
            updateGroupSelect(); // 同步更新計分板的下拉選單
        }

        // 2. 顯示分組結果在遊戲區
        function renderGroups() {
            const container = document.getElementById('groupResultContainer');
            container.innerHTML = ''; // 先清空舊結果
            
            currentGroups.forEach((group, index) => {
                const groupDiv = document.createElement('div');
                groupDiv.style.background = 'rgba(255, 255, 255, 0.05)';
                groupDiv.style.border = '1px solid var(--neon-cyan)';
                groupDiv.style.borderRadius = '8px';
                groupDiv.style.padding = '10px';
                
                const title = document.createElement('div');
                title.innerText = `第 ${index + 1} 組`;
                title.style.color = 'var(--neon-cyan)';
                title.style.fontWeight = 'bold';
                title.style.marginBottom = '8px';
                title.style.borderBottom = '1px solid rgba(0, 255, 255, 0.2)';
                title.style.paddingBottom = '5px';

                const membersList = document.createElement('div');
                membersList.style.color = '#ccc';
                membersList.style.fontSize = '14px';
                membersList.style.lineHeight = '1.8';
                // 將陣列裡的成員用 <br> 換行顯示
                membersList.innerHTML = group.join('<br>') || '<span style="color:#555;">無人</span>';
                groupDiv.appendChild(title);
                groupDiv.appendChild(membersList);
                container.appendChild(groupDiv);
            });
        }

        // 3. 更新計分板的「群組加分」下拉選單
        function updateGroupSelect() {
            const select = document.getElementById('groupSelect');
            if (!select) return;
            
            select.innerHTML = '<option value="">請選擇組別...</option>';
            currentGroups.forEach((group, index) => {
                if (group.length > 0) {
                    const option = document.createElement('option');
                    option.value = index; // 用 index 紀錄是哪一組
                    option.innerText = `第 ${index + 1} 組 (${group.join(', ')})`;
                    select.appendChild(option);
                }
            });
        }
        // 4. 組別集體加分 (!!! 需配合你的計分邏輯微調 !!!)
        function addGroupScore() {
            const groupIndex = document.getElementById('groupSelect').value;
            const scoreToAdd = parseInt(document.getElementById('groupScoreInput').value);
            
            if (groupIndex === "" || isNaN(scoreToAdd)) {
                alert("請選擇組別並輸入有效的分數！");
                return;
            }

            const targetGroup = currentGroups[groupIndex];
    
            // 👇👇👇 請注意這裡 👇👇👇
            // 以下迴圈會歷遍該組的所有成員。
            // 假設你用來紀錄分數的全域變數叫做 scores (例如 scores['李翊群'] = 10)
            targetGroup.forEach(member => {
                if (typeof scores[member] !== 'undefined') {
                    scores[member] += scoreToAdd;
                } else {
                    scores[member] = scoreToAdd; // 預防萬一還沒有紀錄
                }
            });
            // 👆👆👆 👆👆👆 👆👆👆
            document.getElementById('groupScoreInput').value = ''; // 清空輸入框
    
            // 記得在這裡呼叫你原本用來重新繪製記分板畫面的函式！
            updateScoreUI()
            // 例如： renderScoreboard(); 或 updateScores();
    
            alert(`🎉 已成功為 第 ${parseInt(groupIndex) + 1} 組全體加上 ${scoreToAdd} 分！`);
        }
        function updateScoreUI() {
            const board = document.getElementById('leaderboard');
            const select = document.getElementById('scorePlayerSelect');
            if(!board || !select) return;

            board.innerHTML = '';
            select.innerHTML = '<option value="">-- 選擇玩家 --</option>';

            if (members.length === 0) {
                board.innerHTML = '<div style="color:#5c677d; font-size:14px; text-align:center;">請先至記帳頁面新增成員</div>';
                return;
            }

            let memberScores = members.map(m => { return { name: m, score: scores[m] || 0 }; });
            memberScores.sort((a, b) => b.score - a.score);

            memberScores.forEach((ms, index) => {
                let rankStyle = index === 0 ? 'color: #ff9f1c; font-size: 18px;' : 'color: #edf2f4; font-size: 15px;';
                board.innerHTML += `
                    <div class="rank-row">
                        <span><span class="rank-num">#${index + 1}</span> ${ms.name}</span>
                        <b style="${rankStyle}">${ms.score} 分</b>
                    </div>`;
                select.innerHTML += `<option value="${ms.name}">${ms.name}</option>`;
            });
        }

        function updateScore() {
            const name = document.getElementById('scorePlayerSelect').value;
            const change = parseInt(document.getElementById('scoreChange').value);
            if (!name || isNaN(change)) { alert("請選擇玩家並輸入分數！"); return; }

            let current = scores[name] || 0;
            db.ref(`party_data/scores/${name}`).set(current + change).then(() => {
                document.getElementById('scoreChange').value = '';
            });
        }

        // === 8. 資料綁定 ===
        db.ref('party_data/members').on('value', (snapshot) => { members = snapshot.val() || []; updateMemberUI(); });
        db.ref('party_data/expenses').on('value', (snapshot) => { expenses = snapshot.val() || {}; updateExpenseAndSettlementUI(); });
        db.ref('party_data/gift_tiers').on('value', (snapshot) => { giftTiers = snapshot.val() || {}; renderGiftGroupUI(); });
        db.ref('party_data/gift_results').on('value', (snapshot) => { giftResults = snapshot.val() || { good: null, bad: null }; renderGiftResultsUI(); });
        db.ref('party_data/scores').on('value', (snapshot) => { scores = snapshot.val() || {}; updateScoreUI(); });
        
        initGameSync();
    </script>
</body>
