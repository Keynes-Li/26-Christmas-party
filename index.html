<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Christmas Party</title>
    <style>
        :root { --bg-color: #0b132b; --card-bg: #1c2541; --primary-light: #90e0ef; --text-main: #edf2f4; --border-color: #3a506b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; }
        .app-container { width: 95%; max-width: 500px; padding: 20px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; background: #0b132b; border: 1px solid var(--border-color); color: white; border-radius: 8px; }
        button { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--primary-light); color: var(--primary-light); border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .tag { display: inline-block; background: var(--border-color); padding: 5px 10px; border-radius: 20px; margin: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <h3>👥 派對成員名單</h3>
        <input type="text" id="memberInput" placeholder="輸入名字...">
        <button onclick="addMember()">新增成員</button>
        <div id="memberTagsContainer"></div>
    </div>

    <div class="card">
        <h3>💵 選擇付款人</h3>
        <select id="payerSelect"></select>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAHCELtsXy0EOM_PtCIhj1bviLCOAFK8dc",
        authDomain: "christmas-party-d1644.firebaseapp.com",
        databaseURL: "https://christmas-party-d1644-default-rtdb.firebaseio.com",
        projectId: "christmas-party-d1644",
        storageBucket: "christmas-party-d1644.firebasestorage.app",
        messagingSenderId: "109660417434",
        appId: "1:109660417434:web:1e3ad17e8b77a9b8069e23"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let members = [];

    // 1. 更新介面的核心邏輯
    function updateMemberUI() {
        const container = document.getElementById('memberTagsContainer');
        const select = document.getElementById('payerSelect');
        container.innerHTML = '';
        select.innerHTML = '<option value="">選擇付款人</option>';
        
        members.forEach(name => {
            container.innerHTML += `<div class="tag">${name}</div>`;
            select.innerHTML += `<option value="${name}">${name}</option>`;
        });
    }

    // 2. 新增成員並存入雲端
    window.addMember = function() {
        const input = document.getElementById('memberInput');
        if (input.value) {
            members.push(input.value);
            input.value = '';
            
            db.ref('party_data').set({ members: members }).then(() => {
                updateMemberUI();
            });
        }
    };

    // 3. 監聽雲端資料 (自動更新)
    db.ref('party_data/members').on('value', (snapshot) => {
        const data = snapshot.val();
        members = data || [];
        updateMemberUI();
    });
</script>

</body>
</html>
