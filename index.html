<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Christmas Party</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #0b132b;       /* 清爽深藍底色 */
            --card-bg: #1c2541;        /* 稍微淺一點的藍黑卡片 */
            --primary-light: #90e0ef;  /* 核心：清透淡藍色 */
            --accent-blue: #00b4d8;    /* 輔助藍色 */
            --text-main: #edf2f4;      /* 主要文字顏色 */
            --text-muted: #a2d2ff;    /* 次要淡藍文字 */
            --border-color: #3a506b;   /* 細緻邊框藍 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--primary-light);
            text-shadow: 0 0 8px rgba(144, 224, 239, 0.3);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 16px;
            color: var(--primary-light);
            margin-bottom: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 表單元素樣式 */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="number"], select {
            flex: 1;
            background-color: rgba(11, 19, 43, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary-light);
        }

        button {
            background-color: transparent;
            border: 1px solid var(--primary-light);
            color: var(--primary-light);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            background-color: rgba(144, 224, 239, 0.1);
            box-shadow: 0 0 10px rgba(144, 224, 239, 0.2);
        }

        button.btn-block {
            width: 100%;
            background-color: rgba(144, 224, 239, 0.05);
        }

        /* 成員標籤列表 */
        .member-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .tag {
            background-color: rgba(58, 80, 107, 0.4);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag .remove-btn {
            cursor: pointer;
            color: #ef233c;
            font-weight: bold;
        }

        /* 勾選清單（分攤人選） */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-main);
            cursor: pointer;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
            margin: 10px 0 15px 0;
            padding: 10px;
            background: rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        /* 列表樣式 */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(58, 80, 107, 0.3);
            font-size: 14px;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .item-detail {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }

        .amount-txt {
            color: var(--primary-light);
            font-weight: 500;
        }

        /* 結算路線樣式 */
        .settle-route {
            background-color: rgba(144, 224, 239, 0.03);
            border-left: 3px solid var(--primary-light);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .route-arrow {
            color: var(--accent-blue);
            margin: 0 8px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>2026 CHRISTMAS PARTY</h1>
    </header>

    <div class="card">
        <div class="card-title">👥 派對成員管理</div>
        <div class="input-group">
            <input type="text" id="memberInput" placeholder="請輸入成員名字...">
            <button onclick="addMember()">新增</button>
        </div>
        <div class="member-tags" id="memberTagsContainer">
            </div>
    </div>

    <div class="card">
        <div class="card-title">💰 新增消費紀錄</div>
        <div class="input-group">
            <input type="text" id="expenseDesc" placeholder="消費項目（如：披薩）">
            <input type="number" id="expenseAmount" placeholder="金額">
        </div>
        
        <div style="margin-bottom: 8px; font-size: 13px; color: var(--text-muted);">誰付的錢：</div>
        <select id="payerSelect" style="width: 100%; margin-bottom: 15px;">
            <option value="">-- 請先新增成員 --</option>
        </select>

        <div style="margin-bottom: 4px; font-size: 13px; color: var(--text-muted);">誰要平攤（預設全選）：</div>
        <div class="checkbox-grid" id="splitterCheckboxGrid">
            </div>

        <button class="btn-block" onclick="addExpense()">儲存此筆消費</button>
    </div>

    <div class="card">
        <div class="card-title">📝 消費明細</div>
        <div id="expenseListContainer">
            <p style="text-align: center; color: var(--text-muted); font-size: 14px; padding: 10px 0;">暫無消費紀錄</p>
        </div>
    </div>

    <div class="card">
        <div class="card-title">✨ 最速還錢路線結算</div>
        <div id="settlementContainer">
            <p style="text-align: center; color: var(--text-muted); font-size: 14px; padding: 10px 0;">新增開銷後自動計算</p>
        </div>
    </div>
</div>

<script>
    // 狀態資料儲存
    let members = [];
    let expenses = [];

    // 註冊 Service Worker 確保離線可用
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js');
        });
    }

    // 新增成員
    function addMember() {
        const input = document.getElementById('memberInput');
        const name = input.value.trim();
        if (!name) return;
        if (members.includes(name)) {
            alert('成員名字重複了！');
            return;
        }
        members.push(name);
        input.value = '';
        
        updateMemberUI();
        calculateSplit();
    }

    // 刪除成員
    function removeMember(name) {
        members = members.filter(m => m !== name);
        // 同步刪除包含該成員的消費紀錄
        expenses = expenses.filter(exp => exp.paidBy !== name);
        expenses.forEach(exp => {
            exp.splitWith = exp.splitWith.filter(s => s !== name);
        });
        expenses = expenses.filter(exp => exp.splitWith.length > 0);

        updateMemberUI();
        updateExpenseListUI();
        calculateSplit();
    }

    // 更新與成員相關的 UI (標籤、下拉選單、勾選框)
    function updateMemberUI() {
        // 1. 更新標籤
        const tagsContainer = document.getElementById('memberTagsContainer');
        tagsContainer.innerHTML = members.map(m => `
            <div class="tag">
                ${m} <span class="remove-btn" onclick="removeMember('${m}')">×</span>
            </div>
        `).join('');

        // 2. 更新付款人下拉選單
        const payerSelect = document.getElementById('payerSelect');
        if (members.length === 0) {
            payerSelect.innerHTML = '<option value="">-- 請先新增成員 --</option>';
        } else {
            payerSelect.innerHTML = members.map(m => `<option value="${m}">${m}</option>`).join('');
        }

        // 3. 更新平攤者勾選清單
        const checkboxGrid = document.getElementById('splitterCheckboxGrid');
        if (members.length === 0) {
            checkboxGrid.innerHTML = '<span style="font-size:12px; color:var(--text-muted);">暫無成員</span>';
        } else {
            checkboxGrid.innerHTML = members.map(m => `
                <label class="checkbox-label">
                    <input type="checkbox" name="splitters" value="${m}" checked> ${m}
                </label>
            `).join('');
        }
    }

    // 新增一筆消費
    function addExpense() {
        const descInput = document.getElementById('expenseDesc');
        const amountInput = document.getElementById('expenseAmount');
        const payerSelect = document.getElementById('payerSelect');
        
        const desc = descInput.value.trim() || '未命名項目';
        const amount = parseFloat(amountInput.value);
        const paidBy = payerSelect.value;

        if (!amount || amount <= 0) {
            alert('請輸入正確的金額！');
            return;
        }
        if (!paidBy) {
            alert('請先選擇是誰付的錢！');
            return;
        }

        // 獲取有哪些人要一起平攤
        const checkboxes = document.querySelectorAll('input[name="splitters"]:checked');
        const splitWith = Array.from(checkboxes).map(cb => cb.value);

        if (splitWith.length === 0) {
            alert('請至少勾選一位要平攤這筆費用的成員！');
            return;
        }

        // 儲存消費紀錄
        expenses.push({ desc, amount, paidBy, splitWith });

        // 清空輸入框
        descInput.value = '';
        amountInput.value = '';
        
        updateExpenseListUI();
        calculateSplit();
    }

    // 更新明細列表 UI
    function updateExpenseListUI() {
        const container = document.getElementById('expenseListContainer');
        if (expenses.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: var(--text-muted); font-size: 14px; padding: 10px 0;">暫無消費紀錄</p>';
            return;
        }

        container.innerHTML = expenses.map(exp => `
            <div class="list-item">
                <div class="item-detail">
                    <div>${exp.desc}</div>
                    <div class="item-subtitle">由 ${exp.paidBy} 墊付 (${exp.splitWith.join(', ')} 平攤)</div>
                </div>
                <div class="amount-txt">$${exp.amount}</div>
            </div>
        `).join('');
    }

    // 核心演算法：計算還錢路線
    function calculateSplit() {
        const container = document.getElementById('settlementContainer');
        
        if (members.length === 0 || expenses.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: var(--text-muted); font-size: 14px; padding: 10px 0;">新增開銷後自動計算</p>';
            return;
        }

        // 1. 初始化收支帳本
        let balances = {};
        members.forEach(m => balances[m] = 0);

        // 2. 統計每個人該收/該付的淨值
        expenses.forEach(exp => {
            const payer = exp.paidBy;
            const amount = exp.amount;
            const splitters = exp.splitWith;
            const avg = amount / splitters.length;

            balances[payer] += amount; // 幫大家墊錢，所以能收回總額
            splitters.forEach(s => {
                balances[s] -= avg;    // 自己有享受到的份，要扣除
            });
        });

        // 3. 區分欠錢者(負)與收錢者(正)
        let debtors = [];
        let creditors = [];

        for (let m in balances) {
            if (balances[m] < -0.1) {
                debtors.push({ name: m, amount: -balances[m] });
            } else if (balances[m] > 0.1) {
                creditors.push({ name: m, amount: balances[m] });
            }
        }

        // 4. 雙向指引最佳還錢路線
        let html = '';
        let i = 0, j = 0;

        while (i < debtors.length && j < creditors.length) {
            let debtor = debtors[i];
            let creditor = creditors[j];
            let settleAmount = Math.min(debtor.amount, creditor.amount);

            html += `
                <div class="settle-route">
                    <div>
                        <span>${debtor.name}</span>
                        <span class="route-arrow">➔</span>
                        <span>${creditor.name}</span>
                    </div>
                    <div class="amount-txt">$${Math.round(settleAmount)}</div>
                </div>
            `;

            debtor.amount -= settleAmount;
            creditor.amount -= settleAmount;

            if (debtor.amount < 0.1) i++;
            if (creditor.amount < 0.1) j++;
        }

        container.innerHTML = html || '<p style="text-align: center; color: #4caf50; font-size: 14px; padding: 10px 0;">✓ 帳目完全平分，太完美了！</p>';
    }
</script>

</body>
</html>
